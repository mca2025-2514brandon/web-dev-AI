<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="form-card">
        <h1>Sign Up to Register your details</h1>
        
        <form action="" id="signup-form">
            <label for="fullname">Enter your name:</label>
            <input class="form-input" type="text" id="fullname" name="fullname">
            <span class="error-msg" id="fullname-error"></span>

            <label for="email">Enter your email:</label>
            <input class="form-input" type="email" id="email" name="email">
            <span class="error-msg" id="email-error"></span>

            <label for="password">Enter your password:</label>
            <div class="password-wrapper">
                <input class="form-input" type="password" name="password" id="password">
                <button type="button" id="toggle-password">👁</button>
            </div>
            <!-- character counter component to be used for JQuery for counting the length of the password -->
            <span id="char-counter" style="font-size: 12px; color: #ff6b6b;">0/8 characters</span>
            <span class="error-msg" id="password-error"></span>

            <label for="confirm-password">Confirm password:</label>
            <div class="password-wrapper">
                <input class="form-input" type="password" name="confirm-password" id="confirm-password">
                <button type="button" id="toggle-confirm-password">👁</button>
            </div>
            <span class="error-msg" id="confirm-password-error"></span>

            <label for="profile-pic">Upload profile picture:</label>
            <input class="form-input" type="file" name="profile-pic" id="profile-pic" accept="image/*">
            <span class="error-msg" id="profile-pic-error"></span>

            <label for="document">Upload your document of proof:</label>
            <input class="form-input" type="file" name="document" id="document" accept=".docx, .pdf">
            <span class="error-msg" id="document-error"></span>

            <button type="submit">Submit</button>

            <a href="login.html">Already have an account? Login</a>
        </form>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="jquery-components.js"></script>
    <script src="signup-validation.js"></script>
</body>
</html>
